name: CI

# Backend test suite for the SafeStep pilot.
#
# Two jobs:
#   * unit  -- installs only the light deps (pytest, pytest-asyncio, aiohttp)
#              and runs the pure-Python scoring/config tests. Fast and always
#              gating: this must stay green. The API test module skips itself
#              here because osmnx is not installed (pytest.importorskip).
#   * full  -- installs the complete backend/requirements.txt (osmnx, geopandas,
#              fastapi, ...) and runs the whole suite, including the API smoke
#              tests. The geospatial/GDAL stack can be slow or occasionally
#              flaky to install on CI, so this job is best-effort: it must run,
#              but a green PR does not hinge on it. If it proves reliable, drop
#              continue-on-error to make the API tests gating too.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit:
    name: Backend unit tests (light deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install light test deps
        run: python -m pip install --upgrade pip pytest pytest-asyncio aiohttp

      - name: Run unit + config tests
        working-directory: backend
        run: python -m pytest -v

  full:
    name: Full suite (geospatial deps + API tests)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install full backend requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run full test suite (includes guarded API tests)
        working-directory: backend
        run: python -m pytest -v
