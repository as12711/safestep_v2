[pytest]
# Run from the backend/ directory: `python -m pytest`.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# pytest-asyncio: auto mode lets any `async def test_*` run without an explicit
# @pytest.mark.asyncio marker. Current suite is synchronous, but async API-level
# tests added later will work without extra wiring.
asyncio_mode = auto
# Pin the default fixture loop scope to silence the pytest-asyncio deprecation
# warning before any async test lands.
asyncio_default_fixture_loop_scope = function
