# SafeStep Services
# Docker Compose configuration for local development and deployment

services:
  # Python routing backend
  routing-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safestep-routing
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      # Durable cache root (matches the volume mount below).
      - SAFESTEP_CACHE_DIR=/app/cache
      # Area the pilot serves.
      - SAFESTEP_AREA=${SAFESTEP_AREA:-nyu}
      # Browser origins allowed to call the API (comma-separated). Empty is
      # correct for the mobile-only pilot; the RN app sends no Origin header.
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-}
      # Secrets are passed through from the host env / .env, never committed.
      - NYC_OPEN_DATA_APP_TOKEN=${NYC_OPEN_DATA_APP_TOKEN:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    volumes:
      # Persist the built graph + OSMnx downloads across container recreation.
      # config.py writes to /app/cache/{graphs,osmnx} under this volume.
      - routing-cache:/app/cache
      # Development: mount source for hot reload (uncomment if needed)
      # - ./backend/routing:/app/routing:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  routing-cache:
    driver: local
